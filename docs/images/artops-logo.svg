<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer orbital ring -->
  <circle cx="128" cy="128" r="100" stroke="url(#ringGrad)" stroke-width="6" fill="none"/>
  <!-- Directional arrow on ring -->
  <path d="M228 128 l-12 -6 l0 12 z" fill="url(#ringGrad)"/>
  <!-- Inner dashed orbit -->
  <circle cx="128" cy="128" r="82" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <!-- Node: top -->
  <circle cx="128" cy="28"  r="9"  fill="#f0f6fc"/>
  <circle cx="128" cy="28"  r="15" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
  <!-- Node: right -->
  <circle cx="228" cy="128" r="9"  fill="#f0f6fc"/>
  <circle cx="228" cy="128" r="15" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
  <!-- Node: bottom -->
  <circle cx="128" cy="228" r="9"  fill="#f0f6fc"/>
  <circle cx="128" cy="228" r="15" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
  <!-- Node: left -->
  <circle cx="28"  cy="128" r="9"  fill="#f0f6fc"/>
  <circle cx="28"  cy="128" r="15" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
</svg>
