# ─────────────────────────────────────────────────────────────────────────────
# ArtOps Portable — DocFX GitHub Pages Deployment
#
# Stack (validated 2026-06-12):
#   DocFX:   2.78.5 (latest stable) — dotnet tool update -g docfx (always latest)
#   .NET:    8.x LTS — this is the DocFX TOOL runtime, not the app runtime.
#            The project application uses .NET 10 LTS; DocFX the CLI tool runs
#            on .NET 8 LTS (supported through Nov 2026). Do NOT conflate the two.
#   Actions: actions/checkout@v4 · actions/setup-dotnet@v4
#            actions/upload-pages-artifact@v3 · actions/deploy-pages@v4
#
# Template stack: ["default", "modern", "artops-template"]
#   artops-template/ lives inside docs/ alongside docfx.json
#
# Source: https://dotnet.github.io/docfx/ (official pattern, validated 2026-06-12)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy DocFX to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of GITHUB_TOKEN for GitHub Pages deployment
permissions:
  actions:  read
  pages:    write
  id-token: write

# Allow only one concurrent deployment — do NOT cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for git history in DocFX "Edit this page" links

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x   # DocFX tool runtime (LTS). Separate from project's .NET 10 runtime.

      - name: Install / update DocFX (always pulls latest 2.78.x stable)
        run: dotnet tool update -g docfx

      - name: Validate DocFX version
        run: docfx --version

      - name: Build DocFX documentation site
        # docfx.json is in docs/ and references artops-template/ relative to itself
        run: docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
